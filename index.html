<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeDungeon</title>
  <style>
    /* Generated by GitHub Copilot */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    canvas { display: block; width: 100%; height: 100%; }
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #1a1a2e; color: #e0e0e0;
      font-family: system-ui, sans-serif; font-size: 1.4rem;
      z-index: 10; transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    /* Generated by GitHub Copilot */
    #hud-equipment {
      position: fixed;
      bottom: 16px;
      left: 16px;
      display: flex;
      gap: 8px;
      z-index: 5;
      pointer-events: none;
      font-family: system-ui, sans-serif;
    }
    .equip-slot {
      width: 64px;
      height: 64px;
      background: rgba(0, 0, 0, 0.55);
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #e0e0e0;
      font-size: 0.6rem;
      text-align: center;
      line-height: 1.2;
    }
    .equip-slot .icon {
      font-size: 1.4rem;
      margin-bottom: 2px;
    }
    .equip-slot .label {
      max-width: 58px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .equip-slot.empty {
      border-style: dashed;
      color: #888;
    }
    #hud-wave {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      color: #ffcc00;
      font-family: system-ui, sans-serif;
      font-size: 1.4rem;
      font-weight: bold;
      padding: 8px 16px;
      border-radius: 8px;
      border: 2px solid rgba(255,204,0,0.4);
      z-index: 5;
      pointer-events: none;
    }
    #hud-score {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.6);
      color: #ffd700;
      font-family: system-ui, sans-serif;
      font-size: 1.3rem;
      font-weight: bold;
      padding: 8px 14px;
      border-radius: 8px;
      border: 2px solid rgba(255,215,0,0.4);
      z-index: 5;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="loading" role="status" aria-live="polite">Loading…</div>
  <nav id="hud-equipment" aria-label="Equipped items">
    <div class="equip-slot" id="slot-weapon" role="img" aria-label="Weapon slot: empty">
      <span class="icon">⚔️</span>
      <span class="label">—</span>
    </div>
    <div class="equip-slot" id="slot-shield" role="img" aria-label="Shield slot: empty">
      <span class="icon">🛡️</span>
      <span class="label">—</span>
    </div>
  </nav>
  <div id="hud-score" aria-live="polite">🪙 <span id="score-number">0</span></div>
  <div id="hud-wave" aria-live="polite">Wave <span id="wave-number">—</span></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
