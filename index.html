<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VibeDungeon</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; touch-action: none; user-select: none; }
    canvas { display: block; width: 100%; height: 100%; }
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #1a1a2e; color: #e0e0e0;
      font-family: system-ui, sans-serif; font-size: 1.4rem;
      z-index: 10; transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    #hud-equipment {
      position: fixed;
      bottom: 16px;
      left: 16px;
      display: flex;
      gap: 8px;
      z-index: 5;
      pointer-events: none;
      font-family: system-ui, sans-serif;
    }
    .equip-slot {
      width: 64px;
      height: 64px;
      background: rgba(0, 0, 0, 0.55);
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #e0e0e0;
      font-size: 0.6rem;
      text-align: center;
      line-height: 1.2;
    }
    .equip-slot .icon { font-size: 1.4rem; margin-bottom: 2px; }
    .equip-slot .label {
      max-width: 58px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .equip-slot.empty { border-style: dashed; color: #888; }

    #hud-wave {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      color: #ffcc00;
      font-family: system-ui, sans-serif;
      font-size: 1.4rem;
      font-weight: bold;
      padding: 8px 16px;
      border-radius: 8px;
      border: 2px solid rgba(255,204,0,0.4);
      z-index: 5;
      pointer-events: none;
    }
    #hud-score {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.6);
      color: #ffd700;
      font-family: system-ui, sans-serif;
      font-size: 1.3rem;
      font-weight: bold;
      padding: 8px 14px;
      border-radius: 8px;
      border: 2px solid rgba(255,215,0,0.4);
      z-index: 5;
      pointer-events: none;
    }

    /* ── Mobile touch controls ── */
    #touch-controls {
      display: none;
      pointer-events: none;
      z-index: 6;
    }
    @media (pointer: coarse) {
      #touch-controls { display: block; }
      /* Hide equipment HUD bottom-left so it doesn't overlap joystick */
      #hud-equipment { display: none; }
    }

    /* Virtual joystick */
    #joystick-zone {
      position: fixed;
      bottom: 30px;
      left: 30px;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.2);
      pointer-events: all;
      touch-action: none;
    }
    #joystick-knob {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      border: 2px solid rgba(255,255,255,0.6);
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: background 0.1s;
    }

    /* Attack button */
    #btn-attack {
      position: fixed;
      bottom: 50px;
      right: 40px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(220, 60, 60, 0.75);
      border: 3px solid rgba(255, 100, 100, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      pointer-events: all;
      touch-action: none;
      box-shadow: 0 0 16px rgba(220,60,60,0.5);
      -webkit-tap-highlight-color: transparent;
    }
    #btn-attack:active { background: rgba(255, 80, 80, 0.9); transform: scale(0.93); }
  </style>
</head>
<body>
  <div id="loading" role="status" aria-live="polite">Loading…</div>
  <nav id="hud-equipment" aria-label="Equipped items">
    <div class="equip-slot" id="slot-weapon" role="img" aria-label="Weapon slot: empty">
      <span class="icon">⚔️</span>
      <span class="label">—</span>
    </div>
    <div class="equip-slot" id="slot-shield" role="img" aria-label="Shield slot: empty">
      <span class="icon">🛡️</span>
      <span class="label">—</span>
    </div>
  </nav>
  <div id="hud-score" aria-live="polite">🪙 <span id="score-number">0</span></div>
  <div id="hud-wave" aria-live="polite">Wave <span id="wave-number">—</span></div>

  <!-- Mobile touch controls (shown only on touch devices) -->
  <div id="touch-controls">
    <div id="joystick-zone">
      <div id="joystick-knob"></div>
    </div>
    <div id="btn-attack">⚔️</div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
